log4j.debug = false

log4j.rootLogger= error, file
log4j.logger.com.example.CoreBot = debug, stdout
log4j.logger.com.example.CoreBot.TeleBotApplication = debug, stdout
#log4j.logger.Class_name = debug, stdout
#log4j.logger.Class_name_starts_java = debug, stdout
#log4j.logger.com.example.telegrambot.handler = debug, stdout

log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.conversionPattern= [%p] %d [%t] %x %c %M - %m%n

log4j.appender.file=org.apache.log4j.FileAppender
log4j.appender.file.file=logs/logsPackage/newFile.log
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.conversionPattern= [%p] %d [%t] %x %c %M - %m%n